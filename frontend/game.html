<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DDoS Ниндзя - Защитник от DDoS-атак</title>
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <div class="game-wrapper">
        <canvas id="gameCanvas"></canvas>
        
        <div class="game-ui stats">
            <div class="score-box">СЧЕТ: <span id="scoreValue">0</span></div>
            <div class="time-box">ВРЕМЯ: <span id="timeValue">1:30</span></div>
        </div>
        <div class="swipe-instruction">⚔️ Ведите курсором/пальцем по экрану, чтобы разрезать роботов ⚔️</div>
    </div>

    <div id="registrationScreen" class="screen">
        <div class="registration-card">
            <div class="logo">🛡️ DDoS-Guard</div>
            <h1 class="game-title">DDoS Ниндзя</h1>
            <p class="game-subtitle">Разрубай роботов и защищай серверы от DDoS-атак</p>
            <form id="registrationForm">
                <div class="form-group">
                    <input type="text" id="firstName" placeholder="Имя" required>
                </div>
                <div class="form-group">
                    <input type="text" id="lastName" placeholder="Фамилия" required>
                </div>
                <div class="form-group">
                    <input type="tel" id="phone" placeholder="Номер телефона" required>
                </div>
                <button type="submit" class="btn-start">Начать защиту</button>
            </form>
        </div>
    </div>

    <div id="resultScreen" class="screen hidden">
        <div class="result-card">
            <div id="resultTitle" class="result-title"></div>
            <div class="result-score">
                <span id="finalScore">0</span> очков
            </div>
            <button id="restartBtn" class="restart-btn">Играть снова</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
